{% extends "base.html" %}

{% block content %}

<div style="padding: 20px;">

    <!-- Title -->
    <h2 style="text-align:center; margin-bottom:20px;">
        Entry Levels (Live Signals)
    </h2>

    <!-- Chart -->
    <div id="chart" style="height:500px; border-radius:10px;"></div>

    <!-- Signals -->
    <div style="margin-top:30px;">
        <h3>Live Entry Signals</h3>

        <ul id="signalsList" style="list-style:none; padding:0;"></ul>

        <p id="noDataMsg" style="color:gray; display:none;">
            No signals available
        </p>
    </div>

</div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const chartContainer = document.getElementById("chart");

    if (!chartContainer) {
        console.error("Chart container missing");
        return;
    }

    // =====================
    // CREATE CHART
    // =====================
    const chart = LightweightCharts.createChart(chartContainer, {
        width: chartContainer.clientWidth,
        height: 500,

        layout: {
            background: { color: "#0e0e0e" },
            textColor: "#DDD"
        },

        grid: {
            vertLines: { color: "#1a1a1a" },
            horzLines: { color: "#1a1a1a" }
        },

        timeScale: {
            timeVisible: true,
            secondsVisible: false
        },

        rightPriceScale: {
            borderColor: "#444"
        }
    });

    const candleSeries = chart.addCandlestickSeries();

    // =====================
    // RESPONSIVE
    // =====================
    window.addEventListener("resize", () => {
        chart.applyOptions({
            width: chartContainer.clientWidth
        });
    });

    // =====================
    // LOAD CHART DATA
    // =====================
    async function loadChartData() {
        try {
            const res = await fetch("/api/historical-data");
            const data = await res.json();

            if (!data || !data.dates || !data.open) {
                console.error("Invalid data:", data);
                return;
            }

            const candles = data.dates.map((d, i) => {
                const date = new Date(d);

                return {
                    time: {
                        year: date.getFullYear(),
                        month: date.getMonth() + 1,
                        day: date.getDate()
                    },
                    open: +data.open[i],
                    high: +data.high[i],
                    low: +data.low[i],
                    close: +data.close[i]
                };
            });

            candleSeries.setData(candles);

        } catch (err) {
            console.error("Chart load error:", err);
        }
    }

    // =====================
    // LOAD SIGNALS
    // =====================
    async function loadSignals() {
        try {
            const res = await fetch("/api/entry-signals");
            const data = await res.json();

            const list = document.getElementById("signalsList");
            const noDataMsg = document.getElementById("noDataMsg");

            if (!list || !noDataMsg) return;

            list.innerHTML = "";

            if (!Array.isArray(data) || data.length === 0) {
                noDataMsg.style.display = "block";
                candleSeries.setMarkers([]);
                return;
            }

            noDataMsg.style.display = "none";

            const markers = [];

            data.forEach(signal => {

                // UI LIST
                const li = document.createElement("li");

                li.style.padding = "10px";
                li.style.marginBottom = "8px";
                li.style.borderRadius = "6px";
                li.style.fontWeight = "bold";

                if (signal.type === "BUY") {
                    li.style.background = "#1e4620";
                    li.style.color = "#4CAF50";
                } else {
                    li.style.background = "#4a1c1c";
                    li.style.color = "#FF5252";
                }

                li.innerText = `${signal.type} at ${signal.price} (${signal.time})`;
                list.appendChild(li);

                // MARKER FIX (CRITICAL)
                const date = new Date(signal.time);

                markers.push({
                    time: {
                        year: date.getFullYear(),
                        month: date.getMonth() + 1,
                        day: date.getDate()
                    },
                    position: signal.type === "BUY" ? "belowBar" : "aboveBar",
                    color: signal.type === "BUY" ? "#4CAF50" : "#FF5252",
                    shape: signal.type === "BUY" ? "arrowUp" : "arrowDown",
                    text: signal.type
                });
            });

            candleSeries.setMarkers(markers);

        } catch (err) {
            console.error("Signal error:", err);
        }
    }

    // =====================
    // INIT
    // =====================
    async function init() {
        await loadChartData();
        await loadSignals();
    }

    init();

    setInterval(loadSignals, 10000);

});
</script>

{% endblock %}
