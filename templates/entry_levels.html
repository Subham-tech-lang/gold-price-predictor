{% extends "base.html" %}

{% block content %}

<div style="padding: 20px;">

    <h2 style="text-align:center; margin-bottom:20px;">
        Entry Levels (Live Signals)
    </h2>

    <div id="chart" style="height:500px;"></div>

    <div style="margin-top:30px;">
        <h3>Live Entry Signals</h3>

        <ul id="signalsList" style="list-style:none; padding:0;"></ul>

        <p id="noDataMsg" style="color:gray; display:none;">
            No signals available
        </p>
    </div>

</div>

<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

    const container = document.getElementById("chart");

    if (!container) {
        console.error("Chart container missing");
        return;
    }

    // =====================
    // CREATE CHART
    // =====================
    const chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: 500,
        layout: {
            background: { color: "#000" },
            textColor: "#DDD"
        },
        grid: {
            vertLines: { color: "#1a1a1a" },
            horzLines: { color: "#1a1a1a" }
        }
    });

    const candleSeries = chart.addCandlestickSeries();

    // ✅ ONLY DECLARE (no duplicate)
    let entryLine = null;
    let slLine = null;
    let tpLine = null;

    // =====================
    // LOAD CHART DATA
    // =====================
    async function loadChartData() {
        try {
            const res = await fetch("/api/historical-data");

            if (!res.ok) {
                console.error("Chart API failed");
                return;
            }

            const data = await res.json();

            if (!data || !data.dates) return;

            const candles = data.dates.map((d, i) => ({
                time: Math.floor(new Date(d).getTime() / 1000),
                open: Number(data.open[i]),
                high: Number(data.high[i]),
                low: Number(data.low[i]),
                close: Number(data.close[i])
            }));

            candleSeries.setData(candles);

        } catch (err) {
            console.error("Chart error:", err);
        }
    }

    // =====================
    // LOAD SIGNALS (MAIN PART)
    // =====================
    async function loadSignals() {
        try {
            const res = await fetch("/api/entry-signals");

            if (!res.ok) {
                console.error("Signal API failed");
                return;
            }

            const data = await res.json();

            const list = document.getElementById("signalsList");
            const noDataMsg = document.getElementById("noDataMsg");

            list.innerHTML = "";

            if (!Array.isArray(data) || data.length === 0) {
                noDataMsg.style.display = "block";
                return;
            }

            noDataMsg.style.display = "none";

            const latest = data[0];

            // =====================
            // UPDATE UI LIST
            // =====================
            const li = document.createElement("li");

            li.style.padding = "10px";
            li.style.borderRadius = "6px";
            li.style.fontWeight = "bold";

            if (latest.type === "BUY") {
                li.style.backgroundColor = "#1e4620";
                li.style.color = "#4CAF50";
            } else {
                li.style.backgroundColor = "#4a1c1c";
                li.style.color = "#FF5252";
            }

            li.innerText = `${latest.type} at ${latest.price} (SL: ${latest.sl}, TP: ${latest.tp})`;
            list.appendChild(li);

            // =====================
            // REMOVE OLD LINES
            // =====================
            if (entryLine) candleSeries.removePriceLine(entryLine);
            if (slLine) candleSeries.removePriceLine(slLine);
            if (tpLine) candleSeries.removePriceLine(tpLine);

            // =====================
            // DRAW NEW LINES
            // =====================
            entryLine = candleSeries.createPriceLine({
                price: latest.price,
                color: '#FFD700',
                lineWidth: 2,
                title: 'ENTRY'
            });

            slLine = candleSeries.createPriceLine({
                price: latest.sl,
                color: '#FF0000',
                lineWidth: 2,
                lineStyle: 2,
                title: 'SL'
            });

            tpLine = candleSeries.createPriceLine({
                price: latest.tp,
                color: '#00FF00',
                lineWidth: 2,
                lineStyle: 2,
                title: 'TP'
            });

        } catch (error) {
            console.error("Signal error:", error);
        }
    }

    // =====================
    // INIT
    // =====================
    await loadChartData();
    await loadSignals();

    // refresh signals every 10 sec
    setInterval(loadSignals, 10000);

});
</script>

{% endblock %}
