{% extends "base.html" %}

{% block content %}

<div style="padding: 20px;">

    <h2 style="text-align:center; margin-bottom:20px;">
        Entry Levels (Live Signals)
    </h2>

    <!-- TIMEFRAME SELECTOR -->
    <div style="margin-bottom:15px;">
        <label style="margin-right:10px;">Timeframe:</label>

        <select id="timeframeSelect" style="padding:5px; border-radius:5px;">
            <option value="1m">1 Minute</option>
            <option value="5m" selected>5 Minutes</option>
            <option value="15m">15 Minutes</option>
            <option value="30m">30 Minutes</option>
            <option value="1h">1 Hour</option>
        </select>
    </div>

    <!-- CHART -->
    <div id="chart" style="height:500px;"></div>

    <!-- SIGNAL LIST -->
    <div style="margin-top:30px;">
        <h3>Live Entry Signals</h3>
        <ul id="signalsList" style="list-style:none; padding:0;"></ul>
        <p id="noDataMsg" style="color:gray; display:none;">
            No signals available
        </p>
    </div>

    <!-- TRADE PANEL -->
    <div style="margin-top:30px; padding:15px; background:#111; border-radius:10px; color:#fff;">
        <h4>Current Trade</h4>
        <p>Type: <span id="tradeType">-</span></p>
        <p>Entry: <span id="tradeEntry">-</span></p>
        <p>SL: <span id="tradeSL">-</span></p>
        <p>TP: <span id="tradeTP">-</span></p>
        <p>RR: <span id="tradeRR">-</span></p>
    </div>

</div>

<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

    const container = document.getElementById("chart");
    if (!container) return;

    let currentTimeframe = "5m";

    const chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: 500,
        layout: {
            background: { color: "#000" },
            textColor: "#DDD"
        },
        grid: {
            vertLines: { color: "#1a1a1a" },
            horzLines: { color: "#1a1a1a" }
        },
        timeScale: {
            timeVisible: true
        }
    });

    const candleSeries = chart.addCandlestickSeries();

    window.addEventListener("resize", () => {
        chart.applyOptions({ width: container.clientWidth });
    });

    let entryLine, slLine, tpLine;

    // =====================
    // LOAD CHART DATA
    // =====================
    async function loadChartData() {
        try {
            const res = await fetch(`/api/historical-data?interval=${currentTimeframe}`);
            if (!res.ok) return;

            const data = await res.json();

            const candles = data.dates.map((d, i) => ({
                time: Math.floor(new Date(d).getTime() / 1000),
                open: +data.open[i],
                high: +data.high[i],
                low: +data.low[i],
                close: +data.close[i]
            }));

            candleSeries.setData(candles);

        } catch (e) {
            console.error("Chart error:", e);
        }
    }

    // =====================
    // LOAD SIGNALS
    // =====================
    async function loadSignals() {
        try {
            const res = await fetch(`/api/entry-signals?interval=${currentTimeframe}`);
            if (!res.ok) return;

            const data = await res.json();

            const list = document.getElementById("signalsList");
            const noDataMsg = document.getElementById("noDataMsg");

            list.innerHTML = "";

            if (!data || data.length === 0) {
                noDataMsg.style.display = "block";
                return;
            }

            noDataMsg.style.display = "none";

            const latest = data[data.length - 1];

            // =====================
            // TRADE PANEL
            // =====================
            document.getElementById("tradeType").textContent = latest.type;
            document.getElementById("tradeEntry").textContent = latest.price ?? "-";
            document.getElementById("tradeSL").textContent = latest.sl ?? "-";
            document.getElementById("tradeTP").textContent = latest.tp ?? "-";

            // RR calculation safe
            let rr = "-";
            if (latest.sl && latest.tp) {
                const risk = Math.abs(latest.price - latest.sl);
                const reward = Math.abs(latest.tp - latest.price);
                rr = risk > 0 ? (reward / risk).toFixed(2) : "-";
            }

            document.getElementById("tradeRR").textContent = rr;

            // =====================
            // SIGNAL LIST
            // =====================
            const li = document.createElement("li");
            li.style.padding = "10px";
            li.style.borderRadius = "6px";
            li.style.fontWeight = "bold";

            if (latest.type === "BUY") {
                li.style.background = "#1e4620";
                li.style.color = "#4CAF50";
            } else {
                li.style.background = "#4a1c1c";
                li.style.color = "#FF5252";
            }

            li.innerText = `${latest.type} at ${latest.price}`;
            list.appendChild(li);

            // =====================
            // MARKER
            // =====================
            if (latest.time) {
                candleSeries.setMarkers([{
                    time: Math.floor(new Date(latest.time).getTime() / 1000),
                    position: latest.type === "BUY" ? "belowBar" : "aboveBar",
                    color: latest.type === "BUY" ? "#4CAF50" : "#FF5252",
                    shape: latest.type === "BUY" ? "arrowUp" : "arrowDown",
                    text: latest.type
                }]);
            }

            // =====================
            // REMOVE OLD LINES
            // =====================
            if (entryLine) candleSeries.removePriceLine(entryLine);
            if (slLine) candleSeries.removePriceLine(slLine);
            if (tpLine) candleSeries.removePriceLine(tpLine);

            // =====================
            // DRAW LINES
            // =====================
            if (latest.price) {
                entryLine = candleSeries.createPriceLine({
                    price: latest.price,
                    color: '#FFD700',
                    title: 'ENTRY'
                });
            }

            if (latest.sl) {
                slLine = candleSeries.createPriceLine({
                    price: latest.sl,
                    color: '#FF0000',
                    lineStyle: 2,
                    title: 'SL'
                });
            }

            if (latest.tp) {
                tpLine = candleSeries.createPriceLine({
                    price: latest.tp,
                    color: '#00FF00',
                    lineStyle: 2,
                    title: 'TP'
                });
            }

            // =====================
            // RISK-REWARD BOX
            // =====================
            if (window.rrProfit) chart.removeSeries(window.rrProfit);
            if (window.rrLoss) chart.removeSeries(window.rrLoss);

            if (latest.sl && latest.tp) {
                window.rrProfit = chart.addAreaSeries({
                    topColor: 'rgba(0,255,0,0.5)',
                    bottomColor: 'rgba(0,255,0,0.1)',
                    lineColor: 'rgba(0,255,0,0)'
                });

                window.rrLoss = chart.addAreaSeries({
                    topColor: 'rgba(255,0,0,0.5)',
                    bottomColor: 'rgba(255,0,0,0.1)',
                    lineColor: 'rgba(255,0,0,0)'
                });

                const now = Math.floor(Date.now() / 1000);
                const future = now + 3600;

                window.rrProfit.setData([
                    { time: now, value: latest.tp },
                    { time: future, value: latest.tp }
                ]);

                window.rrLoss.setData([
                    { time: now, value: latest.sl },
                    { time: future, value: latest.sl }
                ]);
            }

        } catch (e) {
            console.error("Signal error:", e);
        }
    }

    // =====================
    // TIMEFRAME CHANGE
    // =====================
    document.getElementById("timeframeSelect").addEventListener("change", function () {
        currentTimeframe = this.value;
        loadChartData();
    });

    await loadChartData();
    await loadSignals();

    setInterval(loadSignals, 10000);

});
</script>

{% endblock %}
