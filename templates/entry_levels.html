{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center; margin-top:20px;">Entry Levels (Live Signals)</h2>

<!-- TradingView Chart -->
<div id="tv_chart" style="margin-top:20px;"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 500,
  "symbol": "OANDA:XAUUSD",
  "interval": "5",
  "timezone": "Asia/Kolkata",
  "theme": "dark",
  "style": "1",
  "container_id": "tv_chart"
});
</script>

<!-- Signals Section -->
<div style="margin-top:30px;">
    <h3>Live Entry Signals</h3>
    <ul id="signalsList"></ul>
</div>

<script>
async function loadSignals() {
    try {
        const res = await fetch("/api/entry-signals");
        const data = await res.json();

        const list = document.getElementById("signalsList");
        list.innerHTML = "";

        data.forEach(s => {
            const li = document.createElement("li");
            li.innerText = `${s.type} at ${s.price} (${s.time})`;
            list.appendChild(li);
        });

    } catch (e) {
        console.error(e);
    }
}

loadSignals();
setInterval(loadSignals, 5000);
</script>

{% endblock %}
