{% extends "base.html" %}

{% block content %}

<div style="padding: 20px;">

    <h2 style="text-align:center; margin-bottom:20px;">
        Entry Levels (Live Signals)
    </h2>

    <!-- TIMEFRAME SELECTOR -->
    <div style="margin-bottom:15px;">
        <label style="margin-right:10px;">Timeframe:</label>

        <select id="timeframeSelect" style="padding:5px; border-radius:5px;">
            <option value="1m">1 Minute</option>
            <option value="5m" selected>5 Minutes</option>
            <option value="15m">15 Minutes</option>
            <option value="30m">30 Minutes</option>
            <option value="1h">1 Hour</option>
        </select>
    </div>

    <div id="chart" style="height:500px;"></div>

    <!-- SIGNAL LIST -->
    <div style="margin-top:30px;">
        <h3>Live Entry Signals</h3>
        <ul id="signalsList" style="list-style:none; padding:0;"></ul>
        <p id="noDataMsg" style="color:gray; display:none;">
            No signals available
        </p>
    </div>

    <!-- TRADE PANEL -->
    <div style="margin-top:30px; padding:15px; background:#111; border-radius:10px; color:#fff;">
        <h4>Current Trade</h4>
        <p>Type: <span id="tradeType">-</span></p>
        <p>Entry: <span id="tradeEntry">-</span></p>
        <p>SL: <span id="tradeSL">-</span></p>
        <p>TP: <span id="tradeTP">-</span></p>
        <p>RR: <span id="tradeRR">-</span></p>
    </div>

</div>

<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

    const container = document.getElementById("chart");
    if (!container) return;

    let currentTimeframe = "5m";

    // =====================
    // CHART
    // =====================
    const chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: 500,
        layout: {
            background: { color: "#000" },
            textColor: "#DDD"
        },
        grid: {
            vertLines: { color: "#1a1a1a" },
            horzLines: { color: "#1a1a1a" }
        },
        timeScale: {
            timeVisible: true
        }
    });

    const candleSeries = chart.addCandlestickSeries();

    window.addEventListener("resize", () => {
        chart.applyOptions({ width: container.clientWidth });
    });

    // =====================
    // GLOBAL ELEMENTS
    // =====================
    let entryLine, slLine, tpLine, rrTop, rrBottom;

    // =====================
    // LOAD CHART DATA
    // =====================
    async function loadChartData() {
        try {
            const res = await fetch(`/api/historical-data?interval=${currentTimeframe}`);
            if (!res.ok) return;

            const data = await res.json();

            const candles = data.dates.map((d, i) => ({
                time: Math.floor(new Date(d).getTime() / 1000),
                open: +data.open[i],
                high: +data.high[i],
                low: +data.low[i],
                close: +data.close[i]
            }));

            candleSeries.setData(candles);

        } catch (e) {
            console.error("Chart error:", e);
        }
    }

    // =====================
    // LOAD SIGNALS
    // =====================
    async function loadSignals() {
        try {
            const res = await fetch(`/api/entry-signals?interval=${currentTimeframe}`);
            if (!res.ok) return;

            const data = await res.json();

            const list = document.getElementById("signalsList");
            const noDataMsg = document.getElementById("noDataMsg");

            list.innerHTML = "";

            if (!data.length) {
                noDataMsg.style.display = "block";
                return;
            }

            noDataMsg.style.display = "none";

            const latest = data[data.length - 1];

            // TRADE PANEL
            document.getElementById("tradeType").textContent = latest.type;
            document.getElementById("tradeEntry").textContent = latest.price;
            document.getElementById("tradeSL").textContent = latest.sl ?? "N/A";
            document.getElementById("tradeTP").textContent = latest.tp ?? "N/A";

            const risk = Math.abs(latest.price - latest.sl);
            const reward = Math.abs(latest.tp - latest.price);

            const rr = (risk > 0) ? (reward / risk).toFixed(2) : "N/A";

            document.getElementById("tradeRR").textContent = rr;

            // SIGNAL LIST
            const li = document.createElement("li");
            li.style.padding = "10px";
            li.style.borderRadius = "6px";
            li.style.fontWeight = "bold";

            if (latest.type === "BUY") {
                li.style.background = "#1e4620";
                li.style.color = "#4CAF50";
            } else {
                li.style.background = "#4a1c1c";
                li.style.color = "#FF5252";
            }

            li.innerText = `${latest.type} at ${latest.price}`;
            list.appendChild(li);

            // ONLY LATEST SIGNAL (CLEAN)
            const latestSignal = data[0];

            const markers = [{
                time: Math.floor(new Date(latestSignal.time).getTime() / 1000),
                position: latestSignal.type === "BUY" ? "belowBar" : "aboveBar",
                color: latestSignal.type === "BUY" ? "#4CAF50" : "#FF5252",
                shape: latestSignal.type === "BUY" ? "arrowUp" : "arrowDown",
                text: latestSignal.type
            }];

            candleSeries.setMarkers(markers);

            // REMOVE OLD
            if (entryLine) candleSeries.removePriceLine(entryLine);
            if (slLine) candleSeries.removePriceLine(slLine);
            if (tpLine) candleSeries.removePriceLine(tpLine);
            if (rrTop) chart.removeSeries(rrTop);
            if (rrBottom) chart.removeSeries(rrBottom);

            // DRAW LINES
            entryLine = candleSeries.createPriceLine({
                price: latest.price,
                color: '#FFD700',
                title: 'ENTRY'
            });

            slLine = candleSeries.createPriceLine({
                price: latest.sl,
                color: '#FF0000',
                lineStyle: 2,
                title: 'SL'
            });

            tpLine = candleSeries.createPriceLine({
                price: latest.tp,
                color: '#00FF00',
                lineStyle: 2,
                title: 'TP'
            });

            // RR BOX
            rrTop = chart.addAreaSeries({
                topColor: 'rgba(0,255,0,0.2)',
                bottomColor: 'rgba(0,255,0,0.2)',
                lineColor: '#00FF00'
            });

            rrBottom = chart.addAreaSeries({
                topColor: 'rgba(255,0,0,0.2)',
                bottomColor: 'rgba(255,0,0,0.2)',
                lineColor: '#FF0000'
            });

            const now = Math.floor(Date.now() / 1000);
            const past = now - 1800;

            rrTop.setData([
                { time: past, value: latest.price },
                { time: now, value: latest.tp }
            ]);

            rrBottom.setData([
                { time: past, value: latest.price },
                { time: now, value: latest.sl }
            ]);

        } catch (e) {
            console.error("Signal error:", e);
        }
    }

    // =====================
    // TIMEFRAME CHANGE
    // =====================
    document.getElementById("timeframeSelect").addEventListener("change", function () {
        currentTimeframe = this.value;
        loadChartData();
    });

    // INIT
    await loadChartData();
    await loadSignals();

    setInterval(loadSignals, 10000);

});
</script>

{% endblock %}
