{% extends "base.html" %}

{% block title %}Future Prediction{% endblock %}

{% block content %}

<div class="container mt-5 pt-5">

<h2 class="text-center mb-4">
7 Day Gold Price Prediction
</h2>

<div class="card shadow p-4">

<div class="row justify-content-center">

<div class="col-md-4">

<label>Current Gold Price (USD)</label>

<input type="number" id="price" class="form-control"
placeholder="Example: 5150">

</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-warning btn-lg"
onclick="predictFuture()">

Predict 7 Days

</button>

</div>

</div>

<div id="resultSection" class="mt-5" style="display:none">

<h3 class="text-center mb-4">
7 Day Forecast
</h3>

<div class="row" id="predictionCards"></div>

</div>

</div>

{% endblock %}

{% block extra_scripts %}

<script>

function predictFuture(){

const price=document.getElementById("price").value

fetch("/api/predict-7days-input",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
price:parseFloat(price)
})

})

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("predictionCards")

container.innerHTML=""

data.predictions.forEach((p,i)=>{

container.innerHTML+=`

<div class="col-md-3 mb-3">

<div class="card shadow text-center">

<div class="card-body">

<h6>${data.dates[i]}</h6>

<h4 style="color:#f0ad4e">$${p.toFixed(2)}</h4>

</div>

</div>

</div>

`

})

document.getElementById("resultSection").style.display="block"

})

}

</script>

{% endblock %}
