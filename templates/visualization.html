{% extends "base.html" %}

{% block title %}Gold Price Analytics | Chartflow{% endblock %}

{% block content %}
<div class="container-fluid py-5 mt-5">

    <!-- =========================
        PAGE TITLE
    ========================== -->
    <h1 class="text-center fw-bold mb-5">
        Gold Price Analytics
    </h1>

    <!-- =========================
        CHART SECTION
    ========================== -->
    <div class="container">

        <div class="card shadow border-0">
            <div class="card-body px-4 py-4">

                <!-- CHART HEADER -->
                <h3 class="text-center mb-4 fw-semibold">
                    Gold Price Chart
                </h3>

                <!-- =========================
                    TIMEFRAME CONTROLS
                ========================== -->
                <div class="d-flex justify-content-center flex-wrap gap-2 mb-4">

                    <button class="btn btn-outline-primary timeframe-btn" data-range="1D">
                        1D
                    </button>

                    <button class="btn btn-outline-primary timeframe-btn active" data-range="5D">
                        5D
                    </button>

                    <button class="btn btn-outline-primary timeframe-btn" data-range="1M">
                        1M
                    </button>

                    <button class="btn btn-outline-primary timeframe-btn" data-range="3M">
                        3M
                    </button>

                    <button class="btn btn-outline-primary timeframe-btn" data-range="1Y">
                        1Y
                    </button>

                </div>

                <!-- =========================
                    CHART CANVAS
                ========================== -->
                <div style="height: 520px;">
                    <canvas id="priceChart"></canvas>
                </div>

            </div>
        </div>

    </div>

</div>
{% endblock %}

{% block extra_scripts %}

<!-- =========================
    CHART LIBRARIES (FIXED VERSIONS)
========================= -->

<!-- =========================
    CUSTOM SCRIPT
========================= -->
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>

{% endblock %}
