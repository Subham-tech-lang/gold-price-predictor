{% extends "base.html" %}

{% block title %}Visualizations - Gold Price Predictor{% endblock %}

{% block content %}
<div class="container-fluid py-5 mt-5">

    <!-- TITLE -->
    <h1 class="text-center mb-5">
        Gold Price Analytics
    </h1>

    <!-- =========================
        SINGLE CLEAN CHART
    ========================== -->
    <div class="container">

        <div class="card shadow-sm">
            <div class="card-body">

                <h3 class="text-center mb-4">
                    Gold Price Chart
                </h3>
                <div class="d-flex justify-content-center mb-3">

                    <button class="btn btn-outline-primary me-2 timeframe-btn" data-range="1D">1D</button>
                    <button class="btn btn-outline-primary me-2 timeframe-btn" data-range="5D">5D</button>
                    <button class="btn btn-outline-primary me-2 timeframe-btn" data-range="1M">1M</button>
                    <button class="btn btn-outline-primary me-2 timeframe-btn" data-range="3M">3M</button>
                    <button class="btn btn-outline-primary timeframe-btn" data-range="1Y">1Y</button>

                </div>
                <div style="height:500px;">
                    <canvas id="priceChart"></canvas>
                </div>

            </div>
        </div>

    </div>

</div>
{% endblock %}

{% block extra_scripts %}
<!-- REQUIRED LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<!-- YOUR SCRIPT -->
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
{% endblock %}
